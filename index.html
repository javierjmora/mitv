<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Producto Digital - Pago Seguro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
    --primary-color: #0070ba; /* Azul PayPal */
    --bg-color: #f4f7f9;
    --text-color: #333;
    }
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      background: white;
      padding: 2rem;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      max-width: 400px;
      width: 90%;
      text-align: center;
    }
    .product-image {
      width: 100%;
      height: 200px;
      background: #e0e0e0; /* Cambia esto por una URL de imagen real */
      border-radius: 10px;
      margin-bottom: 1.5rem;
      object-fit: cover;
    }
    h1 { margin: 0.5rem 0; font-size: 1.5rem; }
    p { color: #666; line-height: 1.6; }
    .price {
      font-size: 2rem;
      font-weight: bold;
      color: var(--primary-color);
      margin: 1rem 0;
    }
    #paypal-button-container {
      margin-top: 1.5rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="asesoria.jpg" alt="Producto" class="product-image">
    <h1>Asesoria tecnica</h1>
    <p>Orientacion para la realizacion de un proyecto dirigido a la automatizacion de una tarea.</p>
    <div class="price">$65.00 USD</div>
    <div id="paypal-button-container"></div>
  </div>
  <script src="https://www.paypal.com/sdk/js?client-id=Ad4Hg_8E1D5x0QvjYkahKwsCGSUx3prJR6TqJoggTCE8T-TvUZNjEckcK3OC60d1e4lnwnpaL3HJyn4j&currency=USD"></script>
  <script>
    paypal.Buttons({
      // Configuración del estilo del botón
      style: {
        layout: 'vertical',
        color:  'blue',
        shape:  'rect',
        label:  'paypal'
      },
      // Crear la orden de pago
      createOrder: function(data, actions) {
        return actions.order.create({
          purchase_units: [{
            amount: {
              value: '65.00' // Asegúrate que coincida con tu precio
            },
            description: "Compra de Producto Ejemplo"
          }]
        });
      },
      // Qué pasa cuando el pago es exitoso
            onApprove: function(data, actions) {
                return actions.order.capture().then(function(orderData) {
                    // Aquí puedes redirigir al usuario o mostrar un mensaje
                    console.log('Resultado:', orderData);
                    alert('¡Gracias por tu compra, ' + orderData.payer.name.given_name + '!');
                    // window.location.href = "gracias.html"; // Ejemplo de redirección
                });
            },

            // Manejo de errores
            onError: function(err) {
                console.error('Error en el pago:', err);
                alert('Hubo un error con el pago. Inténtalo de nuevo.');
            }
        }).render('#paypal-button-container');
    </script>
</body>
</html>
