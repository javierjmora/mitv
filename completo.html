<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Servicio de Diseño Web</title>
<style>
body {
font-family: Arial, sans-serif;
background-color: #f9f9f9;
text-align: center;
padding: 50px;
}
.card {
background: white;
padding: 20px;
border-radius: 10px;
max-width: 400px;
margin: auto;
box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}
h1 {
color: #333;
}
p {
color: #555;
}
</style>
</head>
<body>
<div class="card">
<h1>Servicio de Diseño Web</h1>
<p>Creación de páginas web modernas y optimizadas para tu negocio.</p>
<p><strong>Precio: $100 USD</strong></p>
<!-- Contenedor del botón de PayPal -->
<div id="paypal-button-container"></div>
</div>
<!-- SDK de PayPal -->
<script src="https://www.paypal.com/sdk/js?client-id=Ad4Hg_8E1D5x0QvjYkahKwsCGSUx3prJR6TqJoggTCE8T-TvUZNjEckcK3OC60d1e4lnwnpaL3HJyn4j&currency=USD"></script>
<script>
paypal.Buttons({
style: {
color: 'gold',
shape: 'pill',
label: 'pay',
layout: 'vertical'
},
createOrder: function(data, actions) {
return actions.order.create({
purchase_units: [{
description: "Servicio de Diseño Web",
amount: {
value: '100.00'
}
}]
});
},
onApprove: function(data, actions) {
return actions.order.capture().then(function(details) {
alert('Gracias, ' + details.payer.name.given_name + '. Tu pago fue exitoso.');
});
},
onError: function(err) {
console.error(err);
alert('Ocurrió un error al procesar el pago.');
}
}).render('#paypal-button-container');
</script>
</body>
</html>
